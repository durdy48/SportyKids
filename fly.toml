app = "sportykids-api"
primary_region = "cdg"  # Paris — closest available region to Spain (mad is deprecated)

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  LOG_LEVEL = "info"
  CACHE_PROVIDER = "memory"
  MODERATION_FAIL_OPEN = "true"
  AI_RATE_LIMIT_RPM = "14"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[deploy]
  release_command = "npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma"
