# Docker Compose for local PostgreSQL + Redis development
#
# Usage:
#   docker compose up -d              # Start both PostgreSQL and Redis
#   docker compose up -d postgres     # Start only PostgreSQL
#   docker compose up -d redis        # Start only Redis
#
# PostgreSQL:
#   Update .env:
#     DATABASE_URL="postgresql://sportykids:sportykids@localhost:5432/sportykids"
#   Update prisma/schema.prisma:
#     provider = "postgresql"
#   Then run:
#     npx prisma migrate dev
#
# Redis (optional cache backend):
#   Update .env:
#     CACHE_PROVIDER=redis
#     REDIS_URL=redis://localhost:6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: sportykids-postgres
    environment:
      POSTGRES_USER: sportykids
      POSTGRES_PASSWORD: sportykids
      POSTGRES_DB: sportykids
    ports:
      - "5432:5432"
    volumes:
      - sportykids-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportykids"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sportykids-redis
    ports:
      - "6379:6379"
    volumes:
      - sportykids-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  sportykids-pgdata:
  sportykids-redis-data:
